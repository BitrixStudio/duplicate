name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: duplicate

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME}"   # e.g. v0.1.0
          TARGET="${{ matrix.target }}"
          OUT_DIR="dist"
          mkdir -p "$OUT_DIR"

          BIN_PATH="target/${TARGET}/release/${BIN_NAME}"
          test -f "$BIN_PATH"

          ASSET="${BIN_NAME}-${VERSION}-${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "${OUT_DIR}/${ASSET}" "${BIN_NAME}"

          # checksum
          (cd "$OUT_DIR" && shasum -a 256 "$ASSET" > "${ASSET}.sha256")

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}" # v0.1.0
          $Target  = "${{ matrix.target }}"
          $OutDir  = "dist"
          New-Item -ItemType Directory -Force -Path $OutDir | Out-Null

          $BinPath = "target/$Target/release/${env:BIN_NAME}.exe"
          if (!(Test-Path $BinPath)) { throw "Missing $BinPath" }

          $Asset = "${env:BIN_NAME}-$Version-$Target.zip"
          $ZipPath = Join-Path $OutDir $Asset

          Compress-Archive -Path $BinPath -DestinationPath $ZipPath -Force

          $hash = (Get-FileHash $ZipPath -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path (Join-Path $OutDir "$Asset.sha256") -Value "$hash  $Asset"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist_all

      - name: Flatten dist
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          find dist_all -type f -maxdepth 3 -exec cp {} dist/ \;
          ls -la dist

      - name: Create SHA256SUMS.txt
        shell: bash
        run: |
          set -euxo pipefail
          cd dist
          rm -f SHA256SUMS.txt
          for f in *.sha256; do
            # mac shasum file contains "hash  filename", windows file contains same
            cat "$f" >> SHA256SUMS.txt
          done
          echo "" >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true